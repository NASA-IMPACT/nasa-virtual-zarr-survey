# Per-collection overrides applied during `attempt`. Each top-level table is
# keyed by CMR collection concept ID. Allowed sub-keys: parser, dataset,
# datatree (each an inline table of kwargs), skip_dataset, skip_datatree
# (booleans), notes (required one-line rationale on every non-empty entry).
#
# See docs/design/architecture.md#per-collection-overrides for the schema and
# validation rules, or docs/index.md#per-collection-overrides for the user-facing
# walk-through (repro -> override -> validate-overrides -> re-attempt).

name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # so hatch-vcs can read tags
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group docs

      - name: Regenerate report from committed digest
        if: hashFiles('docs/results/summary.json') != ''
        run: |
          uv run nasa-virtual-zarr-survey report \
            --from-data docs/results/summary.json \
            --out docs/results/index.md

      - name: Build docs
        run: uv run --group docs mkdocs build

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force --strict

name: Publish docs via GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Deploy docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0  # so hatch-vcs can read tags
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.9.*"
          enable-cache: true

      - name: Regenerate report from committed digest
        if: hashFiles('docs/results/summary.json') != ''
        run: |
          uv run --group docs nasa-virtual-zarr-survey report \
            --from-data docs/results/summary.json \
            --out docs/results/index.md

      - name: Deploy docs
        run: uv run --group docs mkdocs gh-deploy --force --strict
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
